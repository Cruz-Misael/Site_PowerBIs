<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./images/logo_circular.png">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="./styles_index.css">
</head>
<body>
    <div class="login-container">
        <img src="images/logo_personalizado.png" alt="Logo">
        <h2>Acesse sua conta</h2>
        <form id="login-form">
            <div class="form-field">
                <div class="label">
                    <label>Email:</label>
                </div>
                <input type="email" id="email" placeholder="Digite seu email" onblur="checkEmailExists()" required>
            </div>
            <div class="form-field">
            <div class = "label">
                <label>Senha:</label>
            </div>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>
            <p id="error-message" class="error-message" style="display: none;"></p>
            <p id="success-message" class="success-message" style="display: none;"></p>
            <button type="submit" class="login-button">Entrar</button>
        </form>
        <button class="register-button" onclick="handleRegister()">Registrar-se</button>
    </div>

    <script src="./script.js"></script>
</body>
</html>

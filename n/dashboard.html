<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sebratel</title>
    <link rel="icon" type="image/png" href=".\images\logo_circular.png">
    <link rel="stylesheet" href="styles_dashboard.css">
</head>
<body>

    <header class="header-content">
        <h1 class="header-title">Dashboard Sebratel - <span id="setorNome">Carregando...</span></h1>
        <div class="button-container">
            <button class="config-btn" onclick="irParaConfig()">Configurações</button>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="promo-cards" id="biContainer">
            <!-- Os cards de BI serão adicionados aqui dinamicamente -->
        </section>
    </main>
    <footer class="footer-content">
        <h4><span id="userEmailFooter"></span>   |   Para acessar as dashboards, utilize a credencial: tecnica@sebratel.onmicrosoft.com</h4>
    </footer>
   
    <script src="dashboard.js"></script>
</body>
</html>

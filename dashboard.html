<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sebratel</title>
    <link rel="icon" type="image/png" href="images\logo_circular.png">
    <link rel="stylesheet" href="styles_dashboard.css">
</head>
<body>

    <header class="header-content">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/New_Power_BI_Logo.svg/900px-New_Power_BI_Logo.svg.png" alt="Logo Sebratel" class="logo">
        <h1 class="header-title">Dashboard Sebratel - <span id="setorNome">Carregando...</span></h1>
        <button class="logout-btn" onclick="logout()">Sair</button>
    </header>

    <main class="dashboard-container">
        <img src="images\logo_personalizado.png" class="logo_inicial">
        <section class="promo-cards" id="biContainer">
            <!-- Os cards de BI serão adicionados aqui dinamicamente -->
        </section>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>

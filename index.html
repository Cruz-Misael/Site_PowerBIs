<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sebratel</title>
    <link rel="icon" type="image/png" href="images\logo_circular.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <img src="images\logo_personalizado.png" alt="Logo"> <!-- Insira o caminho correto da imagem PNG -->
        <h3>Acesse sua conta:</h3>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Usuário" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="errorMessage" class="error-message"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
